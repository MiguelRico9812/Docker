services:
  db:
    image: postgres:15-alpine
    container_name: db_server
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: sistema_infra
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d sistema_infra"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    image: nginx:alpine
    container_name: web_server
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./www:/usr/share/nginx/html
    ports:
      - "80:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - frontend_net
      - backend_net

  voip:
    image: andrius/asterisk
    container_name: asterisk_server
    volumes:
      - ./asterisk/pjsip.conf:/etc/asterisk/pjsip.conf
      - ./asterisk/extensions.conf:/etc/asterisk/extensions.conf
      - ./asterisk/modules.conf:/etc/asterisk/modules.conf  # <--- AÑADE ESTA LÍNEA
    ports:
      - "5060:5060/udp"
      - "10000-10100:10000-10100/udp"
    networks:
      - voip_net
    restart: always

  messenger:
    build: ./messaging-udp
    container_name: udp_messenger
    ports:
      - "8080:8080/udp"
    networks:
      - voip_net
    restart: always

networks:
  frontend_net:
  backend_net:
  voip_net:

volumes:
  db_data: