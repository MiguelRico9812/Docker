server {
    listen 80;
    server_name localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
    }

    # Ejemplo de proxy pass si tuvieras una API en el futuro
    # location /api/ {
    #    proxy_pass http://web_backend:5000;
    # }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}