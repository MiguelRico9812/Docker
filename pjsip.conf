; ==========================================
; CONFIGURACIÓN GLOBAL Y TRANSPORTE
; ==========================================
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0

; ==========================================
; EXTENSIÓN 6001
; ==========================================
[6001]
type=endpoint
context=from-internal
disallow=all
allow=ulaw
auth=auth6001
aors=6001

[auth6001]
type=auth
auth_type=userpass
password=password6001
username=6001

[6001]
type=aor
max_contacts=1

; ==========================================
; EXTENSIÓN 6002
; ==========================================
[6002]
type=endpoint
context=from-internal
disallow=all
allow=ulaw
auth=auth6002
aors=6002

[auth6002]
type=auth
auth_type=userpass
password=password6002
username=6002

[6002]
type=aor
max_contacts=1